<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fantasy World</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #141432, #050510);
  color: white;
  text-align: center;
  padding: 40px;
}

h1 { font-size: 32px; }

button {
  margin: 6px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-size: 15px;
  transition: 0.2s;
}

button:hover { opacity: 0.85; }

#gen { background: #6a5acd; }
#storyNameBtn { background: #8a2be2; }
#quizBtn { background: #5a9bd8; }

.box {
  margin-top: 25px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  backdrop-filter: blur(6px);
}

.tag { color: #c9b6ff; font-weight: bold; }
.legendary { color: gold; }

.quizBox h3 { margin-bottom: 15px; }
.quizBox button { display: block; margin: 8px 0; background: linear-gradient(135deg, #6a5acd, #5a9bd8); }
</style>
</head>
<body>

<h1>Fantasy World</h1>

<!-- Генератор персонажа -->
<button id="gen" onclick="toggleGenerator()">Generate Character</button>
<div class="box" id="output">Generate a character...</div>

<!-- Генератор названия рассказа -->
<button id="storyNameBtn" onclick="generateStoryName()">Generate Story Name</button>
<div class="box" id="storyOutput"></div>

<!-- Квиз -->
<button id="quizBtn" onclick="startQuiz()">Who Are You in Fantasy Characters?</button>
<div class="box quizBox" id="quizBox" style="display:none;">
  <div id="quizContent"></div>
</div>

<script>
// ---------------- Character Generator ----------------
let characterVisible = false;
let character = {};

function toggleGenerator() {
  closeQuiz(); // закрываем квиз при генераторе
  characterVisible = true;
  generate();
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function weightedPick(table) {
  const total = table.reduce((sum, item) => sum + item.weight, 0);
  let rand = Math.random() * total;
  for (let item of table) { if (rand < item.weight) return item.value; rand -= item.weight; }
}

// Имя персонажа
const nameStart = ["Ery", "Kael", "Ly", "Ara", "Dra", "Vor", "Zyn", "Mor", "Sel", "Nyx"];
const nameEnd = ["dor", "thorn", "shade", "vane", "mir", "ion", "rael", "strix"];

function generateName() { return pick(nameStart) + pick(nameEnd) + " " + pick(nameStart) + pick(nameEnd); }

// Категории персонажа
const races = [
  { value: "human", weight: 40 },
  { value: "elf", weight: 25 },
  { value: "shadow-born", weight: 15 },
  { value: "void-touched", weight: 10 },
  { value: "dragon-blooded", weight: 7 },
  { value: "god-descended", weight: 3 }
];
const roles = ["wanderer", "exiled prince", "artifact hunter","fallen hero", "dimension walker", "void assassin"];
const factions = ["Order of Light", "Crimson Cult", "Silent Monks","Void Empire", "Stormborn Clan", "Forgotten Council"];
const destinyCore = ["destroy the world", "save the world", "rewrite reality","become a god", "break time itself"];
const destinyTwist = ["at a terrible cost", "but lose their identity","and erase all history", "while dooming someone they love","but never be remembered"];
const secrets = ["is not truly alive","exists in multiple timelines","has already died once","is controlled by an unseen entity","is their own ancestor"];
const starts = ["wakes up with no memory","hears a voice from beyond reality","is hunted by unknown forces","breaks a forbidden artifact","discovers they are already dead"];
const traits = ["ruthless", "melancholic", "unstable", "charismatic", "obsessive"];
const weapons = ["cursed blade", "void staff", "living armor", "ancient relic"];
const companions = ["spirit wolf", "ghost child", "fallen angel", "AI construct"];
const curses = ["Their shadow moves on its own.","They forget loved ones daily.","Reality bends around them.","They exist in constant déjà vu."];

function generateDestiny() { return "will " + pick(destinyCore) + " " + pick(destinyTwist); }

function generate() {
  character = {
    name: generateName(),
    race: weightedPick(races),
    role: pick(roles),
    faction: pick(factions),
    secret: pick(secrets),
    destiny: generateDestiny(),
    start: pick(starts),
    trait: pick(traits),
    weapon: pick(weapons),
    companion: pick(companions),
    curse: pick(curses),
    rarity: calculateRarity()
  };
  renderCharacter();
}

function calculateRarity() {
  let score = Math.random();
  if (score > 0.95) return "LEGENDARY";
  if (score > 0.75) return "EPIC";
  if (score > 0.4) return "RARE";
  return "COMMON";
}

function renderCharacter() {
  document.getElementById("output").style.display = "block";
  document.getElementById("output").innerHTML = `
    <div><span class="tag">NAME:</span> ${character.name}</div>
    <div><span class="tag">RARITY:</span> <span class="${character.rarity === 'LEGENDARY' ? 'legendary' : ''}">${character.rarity}</span></div>
    <br>
    <div><span class="tag">RACE:</span> ${character.race}</div>
    <div><span class="tag">ROLE:</span> ${character.role}</div>
    <div><span class="tag">TRAIT:</span> ${character.trait}</div>
    <br>
    <div><span class="tag">FACTION:</span> ${character.faction}</div>
    <div><span class="tag">COMPANION:</span> ${character.companion}</div>
    <div><span class="tag">WEAPON:</span> ${character.weapon}</div>
    <br>
    <div><span class="tag">START:</span> ${character.start}</div>
    <div><span class="tag">SECRET:</span> ${character.secret}</div>
    <div><span class="tag">CURSE:</span> ${character.curse}</div>
    <br>
    <div><span class="tag">DESTINY:</span> ${character.destiny}</div>
  `;
}

// ---------------- Story Name Generator ----------------
const storyStart = ["Shadow of", "Rise of", "The Legend of", "Curse of", "The Secret of", "Chronicles of","Whispers of","Blood of","Journey of","The Last","Dawn of","The Fall of","Kingdom of","The Hunt for","Echoes of","Prophecy of","The War of","Tales of","Siege of","The Blade of"];
const storyMiddle = ["the Forgotten","the Lost Kingdom","the Dark Mage","the Brave Warrior","the Silent Forest","the Eternal Flame","the Cursed Prince","the Hidden Realm","the Shadow King","the Ancient One","the Ice Queen","the Wandering Knight","the Feral Beast","the Golden City","the Broken Sword","the Silver Phoenix","the Black Tower","the Fireborn","the Night Hunter","the Mystic Orb"];

function generateStoryName() {
  closeQuiz(); // закрываем квиз
  const title = pick(storyStart) + " " + pick(storyMiddle);
  document.getElementById("storyOutput").style.display = "block";
  document.getElementById("storyOutput").innerHTML = `<h3>Story Title:</h3><p>${title}</p>`;
}

// ---------------- Fantasy Quiz ----------------
const quizQuestions = [
  { q: "You find a mysterious artifact. What do you do?", a: ["Study it carefully", "Sell it for profit", "Use it to help others"], type: ["wizard","trickster","hero"] },
  { q: "A dangerous enemy blocks your path. Your choice?", a: ["Face them head-on", "Outsmart them", "Cast a powerful spell"], type: ["hero","trickster","wizard"] },
  { q: "Pick a companion:", a: ["Dragon", "Rogue thief", "Wise old mentor"], type: ["hero","trickster","wizard"] },
  { q: "Ideal home:", a: ["Castle", "Hidden lair", "Tower of magic"], type: ["hero","trickster","wizard"] },
  { q: "Method to achieve goals:", a: ["Valor", "Cunning", "Magic"], type: ["hero","trickster","wizard"] },
  { q: "Pick a magical element:", a: ["Fire", "Illusion", "Light"], type: ["hero","trickster","wizard"] },
  { q: "Which describes you?", a: ["Brave", "Clever", "Wise"], type: ["hero","trickster","wizard"] },
  { q: "Mode of travel?", a: ["Horse", "Secret tunnels", "Portal magic"], type: ["hero","trickster","wizard"] },
  { q: "If ruler, what do you prioritize?", a: ["Justice", "Power", "Knowledge"], type: ["hero","trickster","wizard"] },
  { q: "How handle betrayal?", a: ["Forgive", "Revenge", "Strategy"], type: ["hero","trickster","wizard"] }
];

const fantasyCharacters = {
  hero: { name: "Aragorn", universe: "Lord of the Rings", desc: "Brave ranger destined to unite kingdoms and fight evil, img: https://static.wikia.nocookie.net/lotr/images/0/09/Aragorn_3.jpg/revision/latest?cb=20100617184918." },
  wizard: { name: "Gandalf", universe: "Lord of the Rings", desc: "Wise wizard guiding heroes and wielding powerful magic." },
  trickster: { name: "Tyrion Lannister", universe: "Game of Thrones", desc: "Clever strategist who survives through wit and intelligence." },
  queen: { name: "Daenerys Targaryen", universe: "Game of Thrones", desc: "Determined queen seeking to reclaim her throne and change the world." },
  witcher: { name: "Geralt of Rivia", universe: "The Witcher", desc: "Skilled monster hunter navigating a harsh and dangerous world." },
  elf: { name: "Legolas", universe: "Lord of the Rings", desc: "Agile elf archer with unmatched precision and grace." }
};

let currentQuestion = 0;
let scores = { hero:0, wizard:0, trickster:0, queen:0, witcher:0, elf:0 };

function startQuiz() {
  closeGenerators(); // закрываем генераторы
  document.getElementById("quizBox").style.display = "block";
  currentQuestion = 0;
  for (let k in scores) scores[k] = 0; // reset
  showQuestion();
}

function showQuestion() {
  if(currentQuestion >= quizQuestions.length) { showResult(); return; }
  const q = quizQuestions[currentQuestion];
  let html = `<h3>Q${currentQuestion+1}: ${q.q}</h3>`;
  q.a.forEach((ans, idx) => {
    html += `<button onclick="answer('${q.type[idx]}')">${ans}</button>`;
  });
  document.getElementById("quizContent").innerHTML = html;
}

function answer(type) {
  scores[type] += 1;
  currentQuestion++;
  showQuestion();
}

function showResult() {
  let maxType = Object.keys(scores).reduce((a,b) => scores[a]>=scores[b]?a:b);
  const character = fantasyCharacters[maxType];
  document.getElementById("quizContent").innerHTML = `
    <h2>You are like <span style="color:gold">${character.name}</span>!</h2>
    <h4>Universe: ${character.universe}</h4>
    <p>${character.desc}</p>
    <p>Type: ${maxType}</p>
    <button onclick="restartQuiz()">Try Again</button>
  `;
}

function restartQuiz() { startQuiz(); }

function closeQuiz() { document.getElementById("quizBox").style.display = "none"; }
function closeGenerators() { 
  document.getElementById("output").style.display = "none"; 
  document.getElementById("storyOutput").style.display = "none"; 
}
</script>

</body>
</html>
