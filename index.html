<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fantasy Lore</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #141432, #050510);
  color: white;
  text-align: center;
  padding: 40px;
}

h1 { font-size: 32px; }

button {
  margin: 6px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: black;
  font-size: 15px;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

#gen { background: #6a5acd; }
#curse { background: #2b2b55; }
#quizBtn { background: #5a9bd8; }

.box {
  margin-top: 25px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
  backdrop-filter: blur(6px);
}

.tag { color: #c9b6ff; font-weight: bold; }
.legendary { color: gold; }

.quizBox h3 { margin-bottom: 15px; }
.quizBox button { display: block; margin: 8px 0; }
</style>
</head>

<body>

<h1>🌙 Advanced Living Lore Generator</h1>

<button id="gen" onclick="generate()">Generate Life</button>
<button id="curse" onclick="addCurse()">Add Curse 🌑</button>
<button id="quizBtn" onclick="startQuiz()">🧙‍♂️ Take Fantasy Character Quiz</button>

<div class="box" id="output">Generate a character...</div>

<div class="box quizBox" id="quizBox" style="display:none;">
  <div id="quizContent"></div>
</div>

<script>
// ----------- Character Generator -------------
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function weightedPick(table) {
  const total = table.reduce((sum, item) => sum + item.weight, 0);
  let rand = Math.random() * total;
  for (let item of table) {
    if (rand < item.weight) return item.value;
    rand -= item.weight;
  }
}

const nameStart = ["Ery", "Kael", "Ly", "Ara", "Dra", "Vor", "Zyn", "Mor", "Sel", "Nyx"];
const nameEnd = ["dor", "thorn", "shade", "vane", "mir", "ion", "rael", "strix"];

function generateName() { return pick(nameStart) + pick(nameEnd) + " " + pick(nameStart) + pick(nameEnd); }

const races = [
  { value: "human", weight: 40 },
  { value: "elf", weight: 25 },
  { value: "shadow-born", weight: 15 },
  { value: "void-touched", weight: 10 },
  { value: "dragon-blooded", weight: 7 },
  { value: "god-descended", weight: 3 }
];

const roles = ["wanderer", "exiled prince", "artifact hunter","fallen hero", "dimension walker", "void assassin"];
const factions = ["Order of Light", "Crimson Cult", "Silent Monks","Void Empire", "Stormborn Clan", "Forgotten Council"];
const destinyCore = ["destroy the world", "save the world", "rewrite reality","become a god", "break time itself"];
const destinyTwist = ["at a terrible cost", "but lose their identity","and erase all history", "while dooming someone they love","but never be remembered"];
const secrets = ["is not truly alive","exists in multiple timelines","has already died once","is controlled by an unseen entity","is their own ancestor"];
const starts = ["wakes up with no memory","hears a voice from beyond reality","is hunted by unknown forces","breaks a forbidden artifact","discovers they are already dead"];
const traits = ["ruthless", "melancholic", "unstable", "charismatic", "obsessive"];
const weapons = ["cursed blade", "void staff", "living armor", "ancient relic"];
const companions = ["spirit wolf", "ghost child", "fallen angel", "AI construct"];

let character = {};

function generateDestiny() { return "will " + pick(destinyCore) + " " + pick(destinyTwist); }

function generate() {
  character = {
    name: generateName(),
    race: weightedPick(races),
    role: pick(roles),
    faction: pick(factions),
    secret: pick(secrets),
    destiny: generateDestiny(),
    start: pick(starts),
    trait: pick(traits),
    weapon: pick(weapons),
    companion: pick(companions),
    rarity: calculateRarity()
  };
  render();
}

function calculateRarity() {
  let score = Math.random();
  if (score > 0.95) return "LEGENDARY";
  if (score > 0.75) return "EPIC";
  if (score > 0.4) return "RARE";
  return "COMMON";
}

function addCurse() {
  if (!character.name) return;
  const curses = ["Their shadow moves on its own.","They forget loved ones daily.","Reality bends around them.","They exist in constant déjà vu."];
  character.curse = pick(curses);
  render();
}

function render() {
  document.getElementById("output").innerHTML = `
    <div><span class="tag">NAME:</span> ${character.name}</div>
    <div><span class="tag">RARITY:</span> <span class="${character.rarity === 'LEGENDARY' ? 'legendary' : ''}">${character.rarity}</span></div>
    <br>
    <div><span class="tag">RACE:</span> ${character.race}</div>
    <div><span class="tag">ROLE:</span> ${character.role}</div>
    <div><span class="tag">TRAIT:</span> ${character.trait}</div>
    <br>
    <div><span class="tag">FACTION:</span> ${character.faction}</div>
    <div><span class="tag">COMPANION:</span> ${character.companion}</div>
    <div><span class="tag">WEAPON:</span> ${character.weapon}</div>
    <br>
    <div><span class="tag">START:</span> ${character.start}</div>
    <div><span class="tag">SECRET:</span> ${character.secret}</div>
    ${character.curse ? "<br><div><span class='tag'>CURSE:</span> " + character.curse + "</div>" : ""}
    <br>
    <div><span class="tag">DESTINY:</span> ${character.destiny}</div>
  `;
}

// ----------- Fantasy Quiz -------------
const quizQuestions = [
  { q: "What would you do in a dangerous dungeon?", a: ["Fight bravely", "Sneak around", "Use magic"], scores: [2,1,3] },
  { q: "Pick a weapon", a: ["Sword", "Bow", "Staff"], scores: [2,1,3] },
  { q: "Choose a companion", a: ["Wolf", "Fairy", "Dragon"], scores: [1,2,3] },
  { q: "Your preferred environment", a: ["Forest", "Castle", "Void"], scores: [2,1,3] },
  { q: "Favorite trait", a: ["Courageous", "Clever", "Mysterious"], scores: [2,1,3] },
  { q: "Your goal", a: ["Save the world", "Gain power", "Discover secrets"], scores: [2,3,1] },
  { q: "Pick a color", a: ["Red", "Blue", "Black"], scores: [2,1,3] },
  { q: "Choose a mode of travel", a: ["Horse", "Portal", "Flying beast"], scores: [1,2,3] },
  { q: "Preferred magic", a: ["Fire", "Illusion", "Necromancy"], scores: [2,1,3] },
  { q: "How do you face enemies?", a: ["Direct attack", "Trickery", "Mind control"], scores: [2,1,3] }
];

const fantasyCharacters = [
  { name: "Gandalf", desc: "A wise wizard guiding heroes." },
  { name: "Legolas", desc: "An agile elf archer from the forests." },
  { name: "Drizzt", desc: "A dark elf warrior with a strong code of honor." },
  { name: "Daenerys", desc: "A dragon queen with a destiny to rule." },
  { name: "Geralt", desc: "A monster hunter living by his own rules." }
];

let currentQuestion = 0;
let totalScore = 0;

function startQuiz() {
  currentQuestion = 0;
  totalScore = 0;
  document.getElementById("quizBox").style.display = "block";
  showQuestion();
}

function showQuestion() {
  if(currentQuestion >= quizQuestions.length) {
    showResult();
    return;
  }
  const q = quizQuestions[currentQuestion];
  let html = `<h3>Q${currentQuestion+1}: ${q.q}</h3>`;
  q.a.forEach((ans, idx) => {
    html += `<button onclick="answer(${q.scores[idx]})">${ans}</button>`;
  });
  document.getElementById("quizContent").innerHTML = html;
}

function answer(score) {
  totalScore += score;
  currentQuestion++;
  showQuestion();
}

function showResult() {
  const character = fantasyCharacters[totalScore % fantasyCharacters.length];
  document.getElementById("quizContent").innerHTML = `
    <h2>You are like <span style="color:gold">${character.name}</span>!</h2>
    <p>${character.desc}</p>
    <button onclick="startQuiz()">Try Again</button>
  `;
}
</script>

</body>
</html>
